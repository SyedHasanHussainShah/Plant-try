<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlantDoctor - AI Plant Disease Detector</title>
  <link href="./styles.css" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1 class="title">🌱 PlantDoctor</h1>
    <p class="subtitle">Upload or capture a photo of your plant. Our AI will identify the plant, detect diseases, and give you care suggestions!</p>
    
    <div class="upload-section">
      <div class="upload-group">
        <label class="upload-label">Upload Image</label>
        <input type="file" accept="image/*" id="imageUpload" class="file-input" />
      </div>
      
      <div class="upload-group">
        <label class="upload-label">Or Capture from Camera</label>
        <input type="file" accept="image/*" capture="environment" id="cameraCapture" class="file-input" />
      </div>
      
      <button id="submitBtn" class="submit-btn" disabled>
        Submit
      </button>
    </div>
    
    <div id="preview" class="preview"></div>
    
    <div id="results" class="results">
      <h2>Results</h2>
      <div id="plantName" class="result-item plant-name"></div>
      <div id="disease" class="result-item disease"></div>
      <div id="suggestion" class="result-item suggestion"></div>
    </div>
  </div>
  
  <script src="./app.js"></script>
</body>
</html>

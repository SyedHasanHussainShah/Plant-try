<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlantDoctor - AI Plant Disease Detector</title>
  <link href="./styles.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-green-100 to-green-300 min-h-screen flex flex-col items-center justify-center font-sans">
  <div class="bg-white/80 shadow-xl rounded-2xl p-8 max-w-lg w-full flex flex-col items-center">
    <h1 class="text-3xl font-bold text-green-700 mb-2">🌱 PlantDoctor</h1>
    <p class="text-gray-600 mb-6 text-center">Upload or capture a photo of your plant. Our AI will identify the plant, detect diseases, and give you care suggestions!</p>
    <div class="flex flex-col gap-4 w-full mb-6">
      <label class="block">
        <span class="text-gray-700">Upload Image</span>
        <input type="file" accept="image/*" id="imageUpload" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100" />
      </label>
      <label class="block">
        <span class="text-gray-700">Or Capture from Camera</span>
        <input type="file" accept="image/*" capture="environment" id="cameraCapture" class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100" />
      </label>
      <button id="submitBtn" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200 shadow-md disabled:opacity-50" disabled>Submit</button>
    </div>
    <div id="preview" class="mb-6 w-full flex justify-center"></div>
    <div id="results" class="w-full bg-green-50 rounded-lg p-4 shadow-inner hidden">
      <h2 class="text-xl font-semibold text-green-800 mb-2">Results</h2>
      <div id="plantName" class="mb-1 font-medium"></div>
      <div id="disease" class="mb-1 text-red-600"></div>
      <div id="suggestion" class="text-green-700"></div>
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
